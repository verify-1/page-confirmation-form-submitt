<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Facebook Preview -->
<meta property="og:title" content="Continue to Unlock">
<meta property="og:description" content="Click continue to access content">
<meta property="og:image" content="https://via.placeholder.com/400">

<title>Continue</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: Arial;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #1877f2, #6dd5ed);
    color: white;
}

.box {
    background: rgba(0,0,0,0.5);
    padding: 30px;
    border-radius: 15px;
    width: 320px;
    text-align: center;
}

h2 {
    margin-bottom: 10px;
}

p {
    font-size: 14px;
    margin-bottom: 20px;
}

button {
    width: 100%;
    padding: 14px;
    font-size: 18px;
    border: none;
    border-radius: 25px;
    background: #fff;
    color: #1877f2;
    cursor: pointer;
    font-weight: bold;
}

.loader {
    margin-top: 15px;
    display: none;
}

.dot {
    height: 10px;
    width: 10px;
    margin: 3px;
    background: #00ffcc;
    border-radius: 50%;
    display: inline-block;
    animation: bounce 0.6s infinite alternate;
}

.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
    to { transform: translateY(-10px); }
}
</style>

<script>
function redirectUser() {
    let links = [
        "help.html",
        "help.html"
    ];

    let randomLink = links[Math.floor(Math.random() * links.length)];
    window.location.href = randomLink;
}

function startProcess() {
    document.getElementById("btn").style.display = "none";
    document.getElementById("loader").style.display = "block";

    setTimeout(redirectUser, 1500);
}

// Auto redirect (optional)
setTimeout(function(){
    startProcess();
}, 4000);
</script>

</head>

<body>

<div class="box">
    <h2>🔓 Unlock Content</h2>
    <p>
         Continue
    </p>

    <button id="btn" onclick="startProcess()">Continue</button>

    <div id="loader" class="loader">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
    </div>
</div>

</body>
</html>
